retrieval:
  embedder_model: BAAI/bge-base-en-v1.5
  reranker_model: BAAI/bge-reranker-base
  index_type: ivfflat
  metric: ip
  nlist: 2048
  train_size: 20000
  batch_size: 64
  top_k: 8
  initial_fetch_k: 64
  state_fetch_multiplier: 8
  normalize_embeddings: true
  fusion: rrf

verify:
  support_threshold: 0.62
  narrow_threshold: 0.48
  answer_support_threshold: 0.55
  judge_weight: 0.25
  retrieval_weight: 0.55
  lexical_weight: 0.15
  gold_weight: 0.05
  min_claims: 2
  max_claims: 5
  use_search_plan: true
  use_multi_query_fusion: true

