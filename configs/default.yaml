includes:
  - configs/model/qwen25_7b.yaml
  - configs/method/targeted_clarify.yaml

project:
  name: clarify
  seed: 42

paths:
  data_dir: data
  outputs_dir: outputs

data:
  primary_dataset: infoquest
  infoquest:
    both_settings: true
    local_path: null  # set to a local .jsonl path for offline use

runtime:
  device: cuda
  dtype: auto
  batch_size: 16
  num_workers: 0

generation:
  temperature: 0.0
  top_p: 0.95
  max_new_tokens: 512
  json_max_retries: 2

understand:
  ambiguity_threshold: 0.5
  max_clarification_turns: 1

evaluation:
  case_study_limit: 25

ablations:
  ambiguity_detection: true
  intent_modeling: true
  strategy_selection: true
  targeted_question: true
